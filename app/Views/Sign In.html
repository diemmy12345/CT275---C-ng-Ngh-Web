<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trạm Sách</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row min-vh-100 justify-content-center align-items-center">
            <div class="col-lg-7">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="row g-0">

                        <div class="col-md-5 d-none d-md-flex text-center p-4 justify-content-center align-items-center"
                            style="background:#e2c6a2;">
                            <div>
                                <img src="/public/assets/images/logo.png" class="img-fluid mb-3"
                                    style="max-width:150px;">
                                <h3 class="fw-bold fst-italic" style="color:#5a2d0c;">TRẠM SÁCH</h3>
                                <p class="text-secondary">Nơi lưu giữ những cuốn sách xưa và những câu chuyện cũ.</p>
                            </div>
                        </div>

                        <div class="col-md-7 p-3">
                            <h3 class="fw-bold text-center mb-1" style="color:#5a2d0c;">Đăng nhập</h3>
                            <p class="text-secondary text-center mb-2">Chào mừng bạn quay trở lại</p>

                            <form id="loginForm">
                                <label class="form-label fw-semibold">Email hoặc số điện thoại</label>
                                <div class="input-group mb-3">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="text" id="email" class="form-control"
                                        placeholder="Nhập email hoặc số điện thoại">
                                </div>
                                <div id="emailError" class="text-danger small mb-2"></div>

                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <div class="input-group mb-3">
                                    <span class="input-group-text bg-white"><i class="bi bi-key"></i></span>
                                    <input type="password" id="password" class="form-control"
                                        placeholder="Nhập mật khẩu">
                                    <span class="input-group-text bg-white" onclick="togglePassword()"
                                        style="cursor:pointer;">
                                        <i id="eyeIcon" class="bi bi-eye"></i>
                                    </span>
                                </div>
                                <div id="passwordError" class="text-danger small mb-2"></div>

                                <div class="d-flex justify-content-between mb-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="remember">
                                        <label class="form-check-label" for="remember">Ghi nhớ tôi</label>
                                    </div>
                                    <a href="#" class="fw-semibold text-decoration-none" style="color:#8b5e3c;">
                                        Quên mật khẩu?
                                    </a>
                                </div>

                                <button class="btn w-100 py-1 fw-semibold text-white rounded-3"
                                    style="background:#8b5e3c;">
                                    Đăng nhập
                                </button>
                            </form>

                            <hr>

                            <p class="text-center mb-0">
                                Chưa có tài khoản?
                                <a href="Sign Up.html" class="fw-semibold text-decoration-none" style="color:#8b5e3c;">
                                    Đăng ký ngay
                                </a>
                            </p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const password =
                document.getElementById("password");

            const eyeIcon =
                document.getElementById("eyeIcon");

            password.type =
                password.type === "password"
                    ? "text"
                    : "password";

            eyeIcon.classList.toggle("bi-eye");
            eyeIcon.classList.toggle("bi-eye-slash");
        }

        const loginForm = document.getElementById("loginForm");
        const email = document.getElementById("email");
        const password = document.getElementById("password");

        function validateEmail() {
            const value = email.value.trim();

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // Số điện thoại Việt Nam: bắt đầu bằng 0, có 10 số
            const phonePattern = /^0\d{9}$/;

            if (value === "") {
                emailError.innerText = "Email hoặc số điện thoại không được để trống";
                return false;
            }

            if (!emailPattern.test(value) && !phonePattern.test(value)) {
                emailError.innerText = "Email hoặc số điện thoại không hợp lệ";
                return false;
            }

            emailError.innerText = "";
            return true;
        }

        function validatePassword() {
            if (password.value.trim() === "") {
                passwordError.innerText = "Mật khẩu không được để trống";
                return false;
            }

            if (password.value.length < 6) {
                passwordError.innerText = "Mật khẩu tối thiểu 6 ký tự";
                return false;
            }

            passwordError.innerText = "";
            return true;
        }

        email.addEventListener("input", validateEmail);
        password.addEventListener("input", validatePassword);

        loginForm.addEventListener("submit", function (e) {
            if (!validateEmail() || !validatePassword()) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
