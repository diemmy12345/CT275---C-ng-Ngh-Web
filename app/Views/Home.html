<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Sách Cũ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../public/assets/css/all.css">
</head>

<body>

    <header class="shadow-sm">
        <div class="header-top py-3">
            <div class="container-fluid px-5">
                <div class="row align-items-center g-3">

                    <div class="col-lg-3 col-md-5">
                        <div class="d-flex align-items-center gap-3">
                            <div class="logo-mark">
                                <img src="../../public/assets/images/logo.png" alt="Logo" class="img-fluid">
                            </div>

                            <h2 class="logo-title mb-0">
                                TRẠM SÁCH
                            </h2>
                        </div>
                    </div>

                    <div class="col-lg-5 col-md-7">
                        <form class="input-group search-box">
                            <input type="text" class="form-control" placeholder="Tìm sách, tác giả, thể loại...">
                            <button class="btn search-btn" type="submit">
                                <i class="bi bi-search"></i>
                            </button>
                        </form>
                    </div>

                    <div class="col-lg-4">
                        <div class="d-flex justify-content-lg-end justify-content-between align-items-center gap-3">

                            <div class="d-flex align-items-center gap-2">
                                <span class="icon-box"><i class="bi bi-telephone-fill"></i></span>
                                <div class="d-none d-md-block">
                                    <strong>1900 866 819</strong>
                                    <p class="mb-0 small text-brown-light">Hỗ trợ khách hàng</p>
                                </div>
                            </div>

                            <div class="d-flex align-items-center gap-2">
                                <span class="icon-box"><i class="bi bi-person-fill"></i></span>
                                <div class="d-none d-md-block">
                                    <strong>Đăng nhập</strong>
                                    <p class="mb-0 small text-brown-light">Tài khoản của bạn</p>
                                </div>
                            </div>

                            <div class="cart icon-box position-relative">
                                <i class="bi bi-bag-fill"></i>
                                <span class="cart-badge">0</span>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="category-bar py-2 agin-items-center">
            <div class="container-fluid px-5">
                <div class="d-flex align-items-center justify-content-center gap-4 flex-wrap">

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-book"></i> Sách văn học
                    </a>

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-stars"></i> Sách thiếu nhi
                    </a>

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-journal-text"></i> Sách giáo khoa
                    </a>

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-book-half"></i> Truyện tranh
                    </a>

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-translate"></i> Sách ngoại văn
                    </a>

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-gem"></i> Sách hiếm
                    </a>

                    <a href="#" class="nav-item-book">
                        <i class="bi bi-tags"></i> Khuyến mãi
                    </a>

                </div>
            </div>
        </nav>
    </header>

</body>

</html>
