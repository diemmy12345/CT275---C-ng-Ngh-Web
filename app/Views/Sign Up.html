<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Trạm Sách</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row min-vh-100 justify-content-center align-items-center">
            <div class=" col-lg-5 col-md-4">

                <div class="card border-0 shadow rounded-4 p-2">

                    <h3 class="fw-bold text-center mb-1" style="color:#5a2d0c;">
                        Đăng ký
                    </h3>

                    <form>

                        <div class="mb-2">
                            <label class="form-label fw-semibold">
                                Họ và tên
                            </label>
                            <input type="text" class="form-control py-1" placeholder="Nhập họ và tên">
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-semibold">
                                Email
                            </label>
                            <input type="email" class="form-control py-1" placeholder="Nhập email">
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-semibold">
                                Số điện thoại
                            </label>

                            <input type="tel" class="form-control py-1" placeholder="Nhập số điện thoại">
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-semibold">
                                Mật khẩu
                            </label>
                            <div class="input-group">
                                <input type="password" id="password" class="form-control py-1"
                                    placeholder="Nhập mật khẩu">

                                <span class="input-group-text bg-white py-1" onclick="togglePassword('password','eye1')"
                                    style="cursor:pointer">
                                    <i id="eye1" class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Xác nhận mật khẩu
                            </label>

                            <div class="input-group">
                                <input type="password" id="confirmPassword" class="form-control py-1"
                                    placeholder="Nhập lại mật khẩu">

                                <span class="input-group-text bg-white py-1"
                                    onclick="togglePassword('confirmPassword','eye2')" style="cursor:pointer">
                                    <i id="eye2" class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn w-100 py-1 fw-bold text-white rounded-3"
                            style="background:#8b5e3c;">
                            Đăng ký
                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Đã có tài khoản?
                        <a href="login.php" class="fw-semibold text-decoration-none" style="color:#8b5e3c;">
                            Đăng nhập ngay
                        </a>
                    </p>

                </div>

            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            input.type = input.type === "password" ? "text" : "password";

            icon.classList.toggle("bi-eye");
            icon.classList.toggle("bi-eye-slash");
        }
    </script>
</body>

</html>
