<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Profile</title>
</head>

<body>
    <section class="py-5">
        <div class="container">

            <div class="row g-4 align-items-stretch">

                <!-- CỘT TRÁI -->
                <div class="col-lg-3 d-flex">

                    <div class="card border-0 shadow rounded-4 w-100 h-100">

                        <div class="card-body">

                            <div class="text-center">

                                <div class="position-relative d-inline-block">

                                    <img id="avatar" src="../../public/assets/images/logo.png"
                                        class="rounded-circle border border-3" width="140" height="140"
                                        style="object-fit:cover;">

                                    <label for="avatarUpload"
                                        class="position-absolute bottom-0 end-0 rounded-circle d-flex align-items-center justify-content-center"
                                        style="
                                        width:45px;
                                        height:45px;
                                        background:#c49a6c;
                                        color:white;
                                        cursor:pointer;
                                        border:3px solid white;
                                    ">

                                        <i class="bi bi-camera-fill"></i>

                                    </label>

                                    <input type="file" id="avatarUpload" class="d-none" accept="image/*">

                                </div>

                                <h5 class="fw-bold mt-3 mb-1" style="color:#5a2d0c;">
                                    Nguyễn Văn A
                                </h5>

                                <p class="text-muted small mb-3">
                                    Thành viên Trạm Sách
                                </p>

                            </div>

                            <div class="list-group list-group-flush">

                                <a href="#" class="list-group-item list-group-item-action active fw-semibold"
                                    style="background:#8b5e3c;border-color:#8b5e3c;">

                                    <i class="bi bi-person-circle me-2"></i>
                                    Thông tin tài khoản

                                </a>

                                <a href="#" class="list-group-item list-group-item-action fw-semibold">

                                    <i class="bi bi-bag-check me-2"></i>
                                    Danh sách đơn hàng

                                </a>

                                <a href="#" class="list-group-item list-group-item-action fw-semibold text-danger">

                                    <i class="bi bi-box-arrow-right me-2"></i>
                                    Đăng xuất

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- CỘT PHẢI -->
                <div class="col-lg-9 d-flex">

                    <div class="card border-0 shadow rounded-4 w-100 h-100">

                        <div class="card-body p-3">

                            <h5 class="fw-bold mb-3" style="color:#5a2d0c;">

                                <i class="bi bi-gear-fill"></i>
                                Cập nhật thông tin cá nhân

                            </h5>

                            <form>

                                <div class="row">

                                    <!-- HỌ TÊN -->
                                    <div class="col-md-6 mb-3">

                                        <label class="form-label fw-semibold">
                                            Họ và tên
                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text bg-white py-1">
                                                <i class="bi bi-person"></i>
                                            </span>

                                            <input type="text" class="form-control py-1" value="Nguyễn Văn A">

                                        </div>

                                    </div>

                                    <!-- SĐT -->
                                    <div class="col-md-6 mb-3">

                                        <label class="form-label fw-semibold">
                                            Số điện thoại
                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text bg-white py-1">
                                                <i class="bi bi-telephone"></i>
                                            </span>

                                            <input type="tel" class="form-control py-1" value="0123456789">

                                        </div>

                                    </div>

                                    <!-- NGÀY SINH -->
                                    <div class="col-md-6 mb-3">

                                        <label class="form-label fw-semibold">
                                            Ngày sinh
                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text bg-white py-1">
                                                <i class="bi bi-calendar-event"></i>
                                            </span>

                                            <input type="date" class="form-control py-1">

                                        </div>

                                    </div>

                                    <!-- GIỚI TÍNH -->
                                    <div class="col-md-6 mb-3">

                                        <label class="form-label fw-semibold">
                                            Giới tính
                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text bg-white py-1">
                                                <i class="bi bi-gender-ambiguous"></i>
                                            </span>

                                            <select class="form-select py-1">

                                                <option value="Nam">Nam</option>
                                                <option value="Nữ">Nữ</option>
                                                <option value="Khác">Khác</option>

                                            </select>

                                        </div>

                                    </div>

                                    <!-- ĐỊA CHỈ -->
                                    <div class="col-12 mb-3">

                                        <label class="form-label fw-semibold">
                                            Địa chỉ
                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text bg-white py-1">
                                                <i class="bi bi-geo-alt"></i>
                                            </span>

                                            <input type="text" class="form-control py-1" placeholder="Nhập địa chỉ">

                                        </div>

                                    </div>

                                    <!-- EMAIL -->
                                    <div class="col-12 mb-3">

                                        <label class="form-label fw-semibold">
                                            Địa chỉ Email
                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text text-white py-1" style="background:#8b5e3c;">

                                                <i class="bi bi-envelope"></i>

                                            </span>

                                            <input type="email" class="form-control py-1" value="nguyenvana@gmail.com"
                                                readonly>

                                        </div>

                                        <div class="form-text">
                                            Email dùng để đăng nhập, tạm thời không cho thay đổi.
                                        </div>

                                    </div>

                                </div>

                                <div class="text-end">

                                    <button type="submit" class="btn px-5 py-1 fw-bold text-white"
                                        style="background:#8b5e3c;">

                                        Cập nhật thông tin

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </section>

    <script>
        const avatarUpload = document.getElementById("avatarUpload");
        const avatar = document.getElementById("avatar");

        avatarUpload.addEventListener("change", function () {
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    avatar.src = e.target.result;
                };

                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
